# Test profile — uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:tabvault_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/h2

# JWT test values — these are test-only; never used in production
app.auth.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.auth.jwt.access-token-expiry-minutes=15
app.auth.jwt.refresh-token-expiry-days=7

app.cors.allowed-origins=http://localhost:5173

# Content analysis pipeline — test values (mock client used in tests)
app.content-analysis.anthropic-api-key=test-api-key-not-used
app.content-analysis.model=claude-test-model
app.content-analysis.poll-interval-ms=999999
app.content-analysis.cache-ttl-hours=1

# Redis URL for tests — embedded or disabled
spring.data.redis.url=redis://localhost:6379
