# Test profile — uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:tabvault_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/h2

# JWT test values — these are test-only; never used in production
app.auth.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.auth.jwt.access-token-expiry-minutes=15
app.auth.jwt.refresh-token-expiry-days=7

app.cors.allowed-origins=http://localhost:5173

# Content analysis pipeline — test values (mock client used in tests)
app.content-analysis.anthropic-api-key=test-api-key-not-used
app.content-analysis.model=claude-test-model
app.content-analysis.poll-interval-ms=999999
app.content-analysis.cache-ttl-hours=1

# Redis URL for tests — embedded or disabled
spring.data.redis.url=redis://localhost:6379

# Content extraction — test values (extractors are mocked in tests)
app.content-extraction.youtube-api-key=test-youtube-key-not-used
app.content-extraction.fetch-timeout-ms=1000

# Reminder Service (MOD-005) — VAPID test values
# These are syntactically valid VAPID keys for testing only — never used in production.
# Generated using: npx web-push generate-vapid-keys
app.reminders.vapid.public-key=BDd3_hVL7EsLqFMCg9ABYhKAnR6dHVxGl0yl9yiEiYkm2iOWBtaXxK5AHM9X0lVBuZIoKCZiWCdSBbC9JHKP0W4
app.reminders.vapid.private-key=y9jO5YCBq0KKNfBMDONYH0ZOq2gKJeT8hIiN9SzEiYk
app.reminders.vapid.subject=mailto:test@example.com
app.reminders.dispatch-cron=0 0 8 * * ?

# Quartz — use in-memory store for unit tests so no PostgreSQL connection is required.
# This overrides the JDBC store configured in application.properties.
# Tests do not exercise Quartz persistence; that is verified by live server verification.
spring.quartz.job-store-type=memory
spring.quartz.jdbc.initialize-schema=never
