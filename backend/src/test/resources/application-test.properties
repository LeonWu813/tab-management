# Test profile — uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:tabvault_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT test values — these are test-only; never used in production
app.auth.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.auth.jwt.access-token-expiry-minutes=15
app.auth.jwt.refresh-token-expiry-days=7

app.cors.allowed-origins=http://localhost:5173
