# Server
server.port=${SERVER_PORT:8080}

# Spring profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}

# DataSource — PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT
app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.access-token-expiry-minutes=${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:15}
app.auth.jwt.refresh-token-expiry-days=${JWT_REFRESH_TOKEN_EXPIRY_DAYS:7}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Async thread pool for batch item processing
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=100

# Item management — batch save rate limit
app.items.batch-rate-limit.max-urls=${BATCH_RATE_LIMIT_MAX_URLS:100}
app.items.batch-rate-limit.window-minutes=${BATCH_RATE_LIMIT_WINDOW_MINUTES:60}

# Content analysis pipeline (MOD-003)
app.content-analysis.anthropic-api-key=${ANTHROPIC_API_KEY}
app.content-analysis.model=${CLAUDE_MODEL:claude-sonnet-4-5}
app.content-analysis.poll-interval-ms=${CONTENT_ANALYSIS_POLL_INTERVAL_MS:5000}
app.content-analysis.cache-ttl-hours=${CONTENT_ANALYSIS_CACHE_TTL_HOURS:168}

# Content extraction pipeline (MOD-004)
# YouTube Data API v3 key for transcript retrieval (AC-028)
app.content-extraction.youtube-api-key=${YOUTUBE_API_KEY:}
# HTTP fetch timeout for article, PDF, and OG metadata fetches
app.content-extraction.fetch-timeout-ms=${CONTENT_EXTRACTION_FETCH_TIMEOUT_MS:8000}

# Reminder Service (MOD-005) — VAPID keys for Web Push API
# AC-061: read from environment variables; server fails to start if absent or empty.
# Generate once per environment with: npx web-push generate-vapid-keys
app.reminders.vapid.public-key=${VAPID_PUBLIC_KEY}
app.reminders.vapid.private-key=${VAPID_PRIVATE_KEY}
app.reminders.vapid.subject=${VAPID_SUBJECT}

# Reminder dispatch schedule — cron expression for the daily notification job
# Default: 08:00 UTC every day. Override via REMINDER_DISPATCH_CRON env var.
app.reminders.dispatch-cron=${REMINDER_DISPATCH_CRON:0 0 8 * * ?}

# ---------------------------------------------------------------------------
# Quartz JDBC job store (MOD-005, MOD-006)
# production.md Shared Convention: "The Quartz job store shall be configured as
# JDBC (PostgreSQL-backed) in all environments; the in-memory store shall not be
# used because it does not survive service restarts."
# ---------------------------------------------------------------------------

# Use JDBC-backed job store so triggers survive service restarts
spring.quartz.job-store-type=jdbc

# Flyway owns the qrtz_* schema — never let Quartz auto-create or drop the tables
spring.quartz.jdbc.initialize-schema=never

# Share the application DataSource with Quartz (no separate connection pool needed)
spring.quartz.properties.org.quartz.jobStore.dataSource=quartzDS
spring.quartz.properties.org.quartz.dataSource.quartzDS.provider=hikaricp

# JobStoreTX — reads from QUARTZ_JOB_STORE_CLASS env var; defaults to JobStoreTX
spring.quartz.properties.org.quartz.jobStore.class=${QUARTZ_JOB_STORE_CLASS:org.quartz.impl.jdbcjobstore.JobStoreTX}

# PostgreSQL-specific delegate for the JDBC job store
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

# Table prefix matching the V11 Flyway migration (default is QRTZ_)
spring.quartz.properties.org.quartz.jobStore.tablePrefix=QRTZ_

# Cluster support — disabled for single-node deployment; set to true when horizontal
# scaling is needed (requires isClustered=true and unique instanceId per node)
spring.quartz.properties.org.quartz.jobStore.isClustered=false

# Scheduler instance name and ID
spring.quartz.properties.org.quartz.scheduler.instanceName=TabVaultScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO

# Re-register existing jobs and triggers from Spring beans on startup.
# Set to true so QuartzConfig beans are always authoritative; existing JDBC store
# entries are overwritten with the current bean definitions.
spring.quartz.overwrite-existing-jobs=true

# springdoc / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
