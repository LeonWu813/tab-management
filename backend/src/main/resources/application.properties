# Server
server.port=${SERVER_PORT:8080}

# Spring profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}

# DataSource — PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT
app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.access-token-expiry-minutes=${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:15}
app.auth.jwt.refresh-token-expiry-days=${JWT_REFRESH_TOKEN_EXPIRY_DAYS:7}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# springdoc / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
